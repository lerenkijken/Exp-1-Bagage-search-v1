    let blank_trial = {

    function make_trial(n_targets, loaction_cue_label=null) {
        let loc_indicator
        let trial_start_time, rt
        let target_x, target_y
        let sig_det_label = n_targets == 0 ? 'correct rejection' : 'miss'; // default to absent response
        let resp_dist_px, resp_dist_norm;
    
        let object_info = {}

        let fabric_trial = {
            type: jsPsychCanvasButtonResponse,
            canvas_size: get_canvas_size,
            choices: ['Veilig'],
            post_response_delay: entry_exit_duration,
            stimulus: function (c, buttonGroupElement) {
                
                // select targets and nontargets 
                let selected_non_targets = jsPsych.randomization.sampleWithoutReplacement(non_target_items, n_objects-n_targets)
                let selected_targets = jsPsych.randomization.sampleWithoutReplacement(target_items, n_targets)
 
                let shuffled_selection = jsPsych.randomization.shuffle([...selected_non_targets, ...selected_targets])

                // initialize canvas and timestamp
                trial_start_time = performance.now()
                let canvas = new fabric.Canvas("jspsych-canvas-stimulus", {backgroundColor:fabric_canvas_bg_col, selection:false, centeredScaling:true});
                let canvas_el = document.getElementById("jspsych-canvas-stimulus");

                let canvas_rect = () => {return canvas_el.getBoundingClientRect()};
                let canvas_diag = (canvas_rect().width**2 + canvas_rect().height**2)**0.5

                // add briefcase 
                
                var briefcase_body  = new fabric.Rect({
                    // left:0, top:0, 
                    width:1600, height:900,
                    rx: 5, ry: 5, // round the corners
                    strokeWidth:0,
                    fill:briefcase_color, 
                });


                let briefcase_handle = new fabric.Ellipse({
                    left:0, top:-450,
                    rx: briefcase_body.width*0.2,
                    ry: briefcase_body.width*0.05,
                    strokeWidth:briefcase_body.width*0.03,
                    stroke: briefcase_color,
                    fill:'rgba(0,0,0,0)'
                })

                let briefcase = new fabric.Group([briefcase_handle, briefcase_body], {   
                    left: canvas_rect().width*0.5, top: canvas_rect().height*0.5,
                })
                
                let briefcase_scale;

                // if lanscape orientation, scale based on width of canvas, otherwise scale based on height. 
                // This way the briefcase fits on the screen regardless of orientation 
                if ( (canvas_rect().height / canvas_rect().width)  >  (briefcase.height / briefcase.width) ){
                    briefcase_scale = 0.95 * canvas_rect().width / briefcase.width 
                } else { // if portrait scale accordingly
                    briefcase_scale = 0.95 * canvas_rect().height / briefcase.height 
                }

                if (canvas_rect().width < canvas_rect().height){
                    briefcase.rotate(90)
                    
                    if ( (canvas_rect().height / canvas_rect().width) >  (briefcase.width / briefcase.height) ){  // flip direction of comparison
                        briefcase_scale = 0.95 * canvas_rect().width / briefcase.height 
                    } else {
                        briefcase_scale = 0.95 * canvas_rect().height / briefcase.width 
                    }                                 
                } 

                briefcase.scale(briefcase_scale)               
                canvas.add(briefcase)

                function get_briefcase_body_rect() {
                    let rect_properties
                    let handle_offset = briefcase_handle.ry + briefcase_handle.strokeWidth*0.5
                    if (canvas_rect().width > canvas_rect().height){
                        rect_properties =  {
                            left:briefcase.left, 
                            top: briefcase.top + handle_offset * briefcase_scale * 0.5 , 
                            width:briefcase.width*briefcase_scale, 
                            height: (briefcase.height - handle_offset) * briefcase_scale , 
                            }
                    } else {
                        rect_properties =  {
                            left:   briefcase.left - handle_offset * briefcase_scale * 0.5, 
                            top:    briefcase.top, 
                            height: briefcase.width * briefcase_scale, 
                            width:  (briefcase.height - handle_offset) * briefcase_scale , 
                        }
                    }
                    return rect_properties
                }               

               let briefcase_diag = (get_briefcase_body_rect().width**2 + get_briefcase_body_rect().height**2)**0.5 

                // add a pointer indicator
                loc_indicator = new fabric.Circle({
                    radius: briefcase_diag*0.03 , fill: 'red', opacity:0.7, 
                });

                loc_indicator.set({left:-9999, top:-9999})
                let added_object_locations = []
                // add a bunch of objects in  the briefcase 
                for (let obj of shuffled_selection){ 
                    
                    // handle scaling of objects to make them uniform in size
                    let half_diag = 0.5 * (obj.width**2 + obj.height**2)**0.5  
                    let required_half_diag = obj_briefcase_ratio * briefcase_diag  
                    let obj_scale = required_half_diag / half_diag 
                    
                    obj.scale(obj_scale) // obj.scaleY = obj_scale // obj.scaleX = obj_scale
                    obj.opacity = 1

                    // select random color
                    let rand_color = jsPsych.randomization.sampleWithoutReplacement(['black', 'darkblue', 'darkgreen'], 1)[0]
                    obj.forEachObject(obj_el => {obj_el.fill=rand_color ; obj_el.opacity=0.55});

                    // set to random rotation/orientation
                    obj.angle = Math.round(Math.random()*360)

                    let half_diag_scaled = half_diag * obj_scale *1.2

                    let bcr = get_briefcase_body_rect()

                    
                    let locations_tried = 0
                    function min_dist_ensured(new_loc, old_locs, min_dist=half_diag_scaled){
                        // return true if there are no old locs yet or if more than 1000 locs are tried
                        if (old_locs.length < 1 || locations_tried>500) {return true}

                        // if any old loc is too close return false
                        for (let [x1,y1] of old_locs){
                            let computed_dist = get_dist(x1, y1, new_loc[0], new_loc[1])
                            if ( computed_dist < required_half_diag*2) { return false}
                        }

                        // otherwise all good
                        return true                        
                    }
                    // set object location ensuring no clumping
                    do {
                    obj.left = get_rand_int( bcr.left - (bcr.width*0.5 - half_diag_scaled) ,    bcr.left + (bcr.width*0.5 - half_diag_scaled) )
                    obj.top  = get_rand_int( bcr.top -  (bcr.height*0.5 - half_diag_scaled),    bcr.top  + (bcr.height*0.5 - half_diag_scaled) )
                    locations_tried++ 
                    } while ( ! min_dist_ensured([obj.left, obj.top], added_object_locations)  )  // add a negation: while NOT mininum distance esured, look for another place

                    added_object_locations.push([obj.left, obj.top])
                    console.log('locations_tried', locations_tried);

                    if (obj.img_label.includes('gun') || obj.img_label.includes('knife')) {
                        target_x = obj.left
                        target_y = obj.top
                    }


                    canvas.add(obj) 

                    object_info[obj.img_label] = {x:obj.left, y:obj.top, angle:obj.angle, color:obj.item(0).fill}


                } 

                // add area cue
                let location_cue_obj = new fabric.Rect();
                let cue_x, cue_y
                let bcr = get_briefcase_body_rect()
                
                if        (loaction_cue_label == 'top left'    ) {
                    [cue_x, cue_y] = [bcr.left - bcr.width*0.25,  bcr.top - bcr.height*0.25 ] 

                } else if (loaction_cue_label == 'top right'   ) {
                    [cue_x, cue_y] = [bcr.left + bcr.width*0.25, bcr.top - bcr.height*0.25  ] 

                } else if (loaction_cue_label == 'bottom left' ) {
                    [cue_x, cue_y] = [bcr.left - bcr.width*0.25, bcr.top + bcr.height*0.25 ] 

                } else if (loaction_cue_label == 'bottom right') {
                    [cue_x, cue_y] = [bcr.left + bcr.width*0.25, bcr.top + bcr.height*0.25  ] 

                } else if (loaction_cue_label == 'center' ) {
                    [cue_x, cue_y] = [bcr.left, bcr.top ] 

                } else {
                    [cue_x, cue_y] = [canvas_rect().width*1000, canvas_rect().height*1000] 
                }
                
                
                if (loaction_cue_label) {
                    location_cue_obj.set({
                        left:cue_x, top:cue_y,                        
                        strokeWidth: briefcase_diag * 0.015, 
                        rx: 20, ry: 20, // round the corners
                        stroke: 'rgb(55,0,255, 0.4)', 
                        fill: 'rgba(0,0,0,0)' 
                    });
                    // leave space betwee the cue and edge
                    location_cue_obj.width = bcr.width * 0.5 - location_cue_obj.strokeWidth*2
                    location_cue_obj.height = bcr.height* 0.5 - location_cue_obj.strokeWidth*2

                    canvas.add(location_cue_obj)     
                }
                    
                    
                    
                // entrance animation
                let all_objects = canvas.getObjects()
                let all_objects_grouped = new fabric.Group(all_objects)
                let all_objects_grouped_init_x = all_objects_grouped.left
                let all_objects_grouped_init_y = all_objects_grouped.top

                all_objects_grouped.animate('top', all_objects_grouped_init_y, {
                    from: all_objects_grouped_init_y - canvas_rect().height,
                    onChange: canvas.renderAll.bind(canvas),
                    duration: entry_exit_duration,
                    easing: fabric.util.ease.easeOutExpo
                });

                canvas.renderAll()



                let move_prop, move_val
                function remove_briefcase_animation (safety_indicator) {
                            // exit animation 

                            if (safety_indicator.img_label == 'save.svg') {
                                move_prop = 'left'
                                move_val =  canvas_rect().width
                            } else {
                                move_prop = 'left'
                                move_val = - canvas_rect().height
                            }

                            loc_indicator.animate(move_prop, move_val, {
                                onChange: canvas.renderAll.bind(canvas),
                                duration: entry_exit_duration,
                                easing: fabric.util.ease.easeInExpo
                            });
                            safety_indicator.animate(move_prop, move_val, {
                                onChange: canvas.renderAll.bind(canvas),
                                duration: entry_exit_duration,
                                easing: fabric.util.ease.easeInExpo
                            });
                            all_objects_grouped.animate(move_prop, move_val, {
                                onChange: canvas.renderAll.bind(canvas),
                                duration: entry_exit_duration,
                                easing: fabric.util.ease.easeInExpo
                            });
                        }

                canvas.on('mouse:down', function(options) {
                        // remove previous 
                        canvas.remove(loc_indicator)

                        // update loc for mouse and for touchscreen devices
                        let report_x, report_y;
                        if (''+options.e == '[object MouseEvent]') { 
                            report_x = Math.round(options.e.clientX - canvas_rect().x)
                            report_y = Math.round(options.e.clientY - canvas_rect().y)
                        } else if (''+options.e == '[object TouchEvent]'){
                            let touch = options.e.touches.item(0)
                            report_x = Math.round(touch.clientX - canvas_rect().x)
                            report_y = Math.round(touch.clientY - canvas_rect().y)
                        }

                        // add it back to the canvas
                        loc_indicator.set({left:report_x, top: report_y}),
                        canvas.add(loc_indicator)
                                   
                        // add danger icon
                        let half_diag = 0.5 * (danger_icon.width**2 + danger_icon.height**2)**0.5  
                        let required_half_diag = obj_briefcase_ratio * briefcase_diag  
                        let obj_scale = required_half_diag / half_diag 
                        danger_icon.scale(obj_scale*2.25)
                        danger_icon.set({left:canvas_rect().width*0.75, top: canvas_rect().height*0.25, angle:10}),
                        danger_icon.forEachObject(obj_el => {obj_el.fill= 'red'})
                        canvas.add(danger_icon)

                        //end trial and save data 
                        rt = Math.round(performance.now() - trial_start_time)
                        sig_det_label = n_targets == 1 ? 'hit' : 'false alarm' // update to present response
                        resp_dist_px = get_dist(report_x, report_y, target_x, target_y) 
                        resp_dist_norm = 100 * resp_dist_px / briefcase_diag  // relative to canvas size, so comparable across devices
                        jsPsych.pluginAPI.setTimeout(()=>{ jsPsych.finishTrial()}, entry_exit_duration )
                        
                        remove_briefcase_animation(danger_icon)

                        canvas.renderAll()                        
                });

                for (const button of buttonGroupElement.children) {
                        button.addEventListener("click", () =>{
                            // add safe icon
                            let half_diag = 0.5 * (save_icon.width**2 + save_icon.height**2)**0.5  
                            let required_half_diag = obj_briefcase_ratio * briefcase_diag  
                            let obj_scale = required_half_diag / half_diag 
                            save_icon.scale(obj_scale*2.25)
                            save_icon.set({left:canvas_rect().width*0.2, top: canvas_rect().height*0.25, angle:-10}),
                            save_icon.forEachObject(obj_el => {obj_el.fill= '#2d00c8'})
                            canvas.add(save_icon)
                            remove_briefcase_animation(save_icon)
                        }  );
                }             
                
            },      
            

            on_finish:(data) => {
                data.label = 'search_trial' 
                data.reported_loc_on_canvas = {x:loc_indicator.left, y:loc_indicator.top}
                data.n_targets = n_targets
                data.cued_area = loaction_cue_label
                data.rt = rt ? rt : Math.round(performance.now() - trial_start_time)
                data.sig_det_label = sig_det_label
                data.resp_dist_px = resp_dist_px
                data.resp_dist_norm = resp_dist_norm

                data.object_info = object_info
                
                jsPsych.pluginAPI.clearAllTimeouts()
                console.log('on finish is called')
            }
        } 

        return fabric_trial
        }

    // build trial sequence:

    const intro = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `<h1>Welkom! - ${exp_version}</h1>` +
        "<p>Je  verboden voorwerpen in de koffers!</p>",
        choices: ["Begin!"],
        data:{
            label:'intro',
        }
    };


    // get summary data
    let summary_data = null 
    try {
        window.xhr = $.post('https://www.lerenkijken.nl/api/get_summary', {'exp_id': exp_id}).done(function(res){
        if(xhr.status == 200){
            // console.log('OK!');
            summary_data = res 
            } else{
                console.log(xhr.status);
                summary_data = '  retrieval of summary datas did not return 200  '
            }
        }).fail(function(){
            console.log(xhr.status);
            summary_data = '  retrieval of summary data failed  '
        });
    } catch (error){
        console.error(error);
    }   

    const save_data = {
        type: jsPsychCallFunction,
        async: true,
        func: function(done){
            try {
                window.xhr = $.post('https://www.lerenkijken.nl/api/save', jsPsych.data.get().json()).done(function(){
                    if(xhr.status == 200){
                        console.log('data saved OK!');
                        done()
                    } else{
                        console.log(xhr.status);
                    }
                }).fail(function(){
                    console.log(xhr.status);
                });
            } catch (error){
                console.log(error);
            }
            done()
        },
        on_start: function(){
            // write summary data to the first object
            let summary_object = {}   
            let search_trials = jsPsych.data.get().filter({label: 'search_trial'})

            let mean_rt = search_trials.select('rt').mean()

            summary_object.mean_rt = mean_rt
            summary_object.false_alarms = '0.0.6'

            jsPsych.data.get().first(1).values()[0]['user_summary_info'] = summary_object
        },
    }
    // make timeline



    let timeline = [user_info_trial, intro]

    // make trials with random number of targets (gun/knife) and random cue location (or no cue)
    for (let i=0; i < n_search_trials ; i++ ) {
        let num_of_targets = get_rand_int(0,1) 
        let selected_cue = jsPsych.randomization.sampleWithoutReplacement(['top left', 'top right', 'bottom left','bottom right', 'center', null], 1)[0]
        // let selected_cue = ['top left', 'top right', 'bottom left','bottom right', 'center', null][i%6]
        timeline.push( make_trial( num_of_targets, loaction_cue_label=selected_cue ), blank_trial ) 
    }

    timeline.push(save_data)
    
    jsPsych.run(timeline);   



    // extra utility functions
    function get_rand_rgb_str(){
        return `rgb(${Math.round(Math.random()*255)}, ${Math.round(Math.random()*255)}, ${Math.round(Math.random()*255)})`
    }

    function get_rand_int(min, max) {
        min = Math.ceil(min);
        max = Math.floor(max);
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    
    function get_rand_float(min, max) {
        return Math.random() * (max - min) + min;
    }

    function get_dist(x1, y1, x2, y2) {
        return ( (x2-x1)**2 + (y2-y1)**2 )**0.5
    }

  </script>
